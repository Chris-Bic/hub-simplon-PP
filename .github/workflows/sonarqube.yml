name: Responsible CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: responsible-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code quality with SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build --if-present
      - run: npm test --if-present

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v5

  eco-budget:
    name: Eco/performance budget
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build --if-present

      - name: Start backend
        run: npm run start --workspace backend &

      - name: Wait for backend
        run: npx wait-on --timeout 15000 http://127.0.0.1:4100/api/home

      - name: Start frontend
        run: npm run serve:lhci &

      - name: Wait for frontend
        run: npx wait-on --timeout 15000 http://127.0.0.1:4173/

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: false
          temporaryPublicStorage: true

      - name: Add Lighthouse report link
        if: always()
        uses: actions/github-script@v7
        env:
          LIGHTHOUSE_LINKS: ${{ steps.lighthouse.outputs.links }}
        with:
          script: |
            const fs = require('fs')
            const linksRaw = process.env.LIGHTHOUSE_LINKS

            if (!linksRaw || linksRaw === 'null') {
              core.setFailed('No Lighthouse public report link found')
              return
            }

            const links = JSON.parse(linksRaw)
            const lines = ['### Lighthouse', '']
            for (const [url, report] of Object.entries(links)) {
              lines.push(`- [${url}](${report})`)
            }

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`)

      - name: Install GreenIT Analysis CLI
        run: |
          git clone --depth 1 https://github.com/cnumr/GreenIT-Analysis-cli.git /tmp/greenit-cli
          cd /tmp/greenit-cli
          npm install --ignore-scripts
          node builder.js
          chmod +x greenit
          echo "/tmp/greenit-cli" >> $GITHUB_PATH

      - name: Run GreenIT Analysis
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
        run: greenit analyse ./greenit-urls.yaml greenit-report --format html --ci

      - name: Upload GreenIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: greenit-results
          path: greenit-report*
